<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>89.6 Radio Damroo - Halla Har Dil Mein</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'], display: ['Rajdhani', 'sans-serif'] },
                    colors: { brand: { red: '#E13B30', yellow: '#F1BE3B', dark: '#0A0A0E', card: '#14141A' } }
                }
            }
        }
    </script>
    <style>
        body { background: radial-gradient(circle at top, #200b0b 0%, #050508 100%); font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="text-neutral-100 min-h-screen flex flex-col">
    <header class="border-b border-neutral-800/80 bg-black/70 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <img src="logo.png" alt="Logo" class="h-16 w-auto object-contain">
            <span class="text-xs font-semibold text-neutral-300 uppercase">Live: <span class="text-brand-yellow font-bold">Maha Dhamaka Hits</span></span>
        </div>
    </header>
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-8 flex flex-col items-center justify-center text-center">
        <div class="bg-brand-card/60 border border-neutral-800/60 rounded-3xl p-8 max-w-lg w-full shadow-2xl">
            <div class="flex justify-between items-center mb-6 bg-black/40 p-3 rounded-full border border-neutral-800">
                <span class="bg-brand-red text-white text-[10px] font-bold px-3 py-1 rounded-full animate-pulse uppercase tracking-wider">On Air</span>
                <span class="text-xs text-neutral-300 font-medium px-2"><i class="fa-solid fa-users text-brand-yellow mr-1.5"></i><span id="listener-count">3,485</span> Sun rahe hain</span>
            </div>

            <img src="logo.png" alt="Radio Damroo" class="h-28 mx-auto mb-6 object-contain">
            <h2 class="text-2xl font-bold font-display text-white mb-2">89.6 Radio Damroo</h2>
            <p class="text-xs text-brand-yellow tracking-widest uppercase font-semibold mb-6">Halla Har Dil Mein</p>
            
            <audio id="radio-audio" preload="none"></audio>
            
            <button id="play-btn" onclick="togglePlay()" class="w-20 h-20 bg-gradient-to-r from-brand-red to-brand-yellow text-neutral-950 text-2xl rounded-full mx-auto flex items-center justify-center shadow-lg transform active:scale-95 transition-all">
                <i id="play-icon" class="fa-solid fa-play ml-1"></i>
            </button>
            <p id="status" class="text-xs text-neutral-400 mt-4">Play button par click karke live suniye!</p>
        </div>
    </main>

    <script>
        const audio = document.getElementById('radio-audio');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const status = document.getElementById('status');
        let isPlaying = false;

        // IsMyRadio direct icecast stream links ke teen alag alag backup
        const streamUrls = [
            "http://damroo.ismyradio.com:8000/stream",
            "http://damroo.ismyradio.com/;stream.mp3",
            "https://damroo.ismyradio.com/;"
        ];
        let currentStreamIndex = 0;

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                audio.src = ""; // Clear buffer
                isPlaying = false;
                playIcon.className = "fa-solid fa-play ml-1";
                status.innerText = "Paused";
            } else {
                status.innerText = "Connecting...";
                
                // Set the current stream URL
                audio.src = streamUrls[currentStreamIndex];
                
                audio.play().then(() => {
                    isPlaying = true;
                    playIcon.className = "fa-solid fa-pause";
                    status.innerText = "Halla Chalu Hai!";
                }).catch(err => {
                    console.log("Stream failed, trying backup link...");
                    // Try next backup link if first one fails
                    currentStreamIndex = (currentStreamIndex + 1) % streamUrls.length;
                    audio.src = streamUrls[currentStreamIndex];
                    
                    audio.play().then(() => {
                        isPlaying = true;
                        playIcon.className = "fa-solid fa-pause";
                        status.innerText = "Halla Chalu Hai!";
                    }).catch(e => {
                        status.innerText = "Stream offline hai ya proxy issue hai.";
                    });
                });
            }
        }

        // Fake Counter Back-up functions
        let currentListeners = 3485;
        setInterval(() => {
            const change = Math.floor(Math.random() * 7) - 3; 
            currentListeners += change;
            document.getElementById('listener-count').innerText = currentListeners.toLocaleString('en-US');
        }, 5000);
    </script>
</body>
</html>
